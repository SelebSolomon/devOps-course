services:
  todo-backend:
    build: ./server
    container_name: todo-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
  

  todo-frontend:
    build: 
      context: ./client
      args:
        - VITE_API_URL=http://16.171.25.112:5000/api
    container_name: todo-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - todo-backend
    