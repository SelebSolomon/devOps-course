name: build-and-lint

# this will define when the workflow will run
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# this will define the jobs that will run as part of the workflow
jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./server

      - name: Run linting
        run: npm run lint
        working-directory: ./server

      - name: Run formatting check
        run: npm run format -- --check
        working-directory: ./server

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./client

      - name: Run frontend linting
        run: npm run lint
        working-directory: ./client

      - name: Build backend images
        run: docker build -t todo-backend ./server

      - name: Build frontend images
        run: docker build -t todo-frontend ./client

  deploy:
    needs: build-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Optional)
        uses: actions/checkout@v3

      - name: add ec2 to a known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
      # - env:
      #     EC2_HOST: ${{ secrets.EC2_HOST }}
      #     EC2_USER: ${{ secrets.EC2_USER }}
      - name: write ssh
        run: |
          echo "${{ secrets.EC2_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh -i ec2_key.pem $EC2_USER@$EC2_HOST << EOF
            set -e
            cd $EC2_APP_DIR

            git fetch --all
            git reset --hard origin/main


            docker-compose down
            docker-compose pull
            docker-compose up -d --build

            docker image prune -f

            docker compose ps

          EOF


